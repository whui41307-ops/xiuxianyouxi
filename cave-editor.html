<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>洞府后台编辑器</title><style>*{box-sizing:border-box}body{margin:0;background:#07101a;color:#f7df9c;font-family:system-ui,-apple-system,"Microsoft YaHei",Arial,sans-serif}.app{display:grid;grid-template-columns:1fr 330px;gap:12px;height:100vh;padding:12px}.stageWrap{display:flex;align-items:center;justify-content:center;overflow:auto;background:radial-gradient(circle,#18283a,#05080d);border:1px solid #8b7240;border-radius:14px}.stage{position:relative;width:min(68vh,430px);aspect-ratio:9/16;background:#101923;border:2px solid #d7b865;border-radius:18px;overflow:hidden;box-shadow:0 0 40px #000}.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.grid:before{content:"";position:absolute;inset:0;background-image:linear-gradient(rgba(87,244,255,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(87,244,255,.16) 1px,transparent 1px);background-size:5% 5%;pointer-events:none;z-index:9000}.item{position:absolute;left:50%;top:50%;width:25%;transform:translate(-50%,-50%) scale(1) rotate(0deg);transform-origin:center center;cursor:move;user-select:none;touch-action:none}.item img{display:block;width:100%;pointer-events:none}.hot{height:10%;border:2px dashed rgba(87,244,255,.8);background:rgba(87,244,255,.14);border-radius:10px}.item.sel{outline:2px solid #57f4ff;box-shadow:0 0 20px rgba(87,244,255,.5)}.handle{display:none;position:absolute;width:16px;height:16px;border-radius:50%;background:#57f4ff;border:2px solid #06202a;right:-10px;bottom:-10px;cursor:nwse-resize;z-index:9999}.rot{display:none;position:absolute;width:16px;height:16px;border-radius:50%;background:#ffd76a;border:2px solid #382600;left:50%;top:-28px;translate:-50% 0;cursor:grab;z-index:9999}.sel .handle,.sel .rot{display:block}.side{overflow:auto;background:#0b1420;border:1px solid #8b7240;border-radius:14px;padding:12px}.side h2{margin:0 0 10px}.group{border:1px solid rgba(215,184,101,.35);border-radius:12px;padding:10px;margin:10px 0;background:rgba(255,255,255,.03)}label{font-size:12px;color:#b7c7cf}button,input,select,textarea{width:100%;margin-top:6px;border:1px solid rgba(215,184,101,.55);border-radius:9px;background:#121f2d;color:#ffe8a8;padding:8px}button{cursor:pointer;font-weight:700}.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.muted{color:#9fb1bf;font-size:12px;line-height:1.5}.small{font-size:12px;padding:6px}.danger{border-color:#b85b5b;color:#ff9c9c}textarea{height:170px;font-family:Consolas,monospace;font-size:12px}.stat{font-size:12px;color:#c8d9df;line-height:1.8}@media(max-width:800px){.app{grid-template-columns:1fr;height:auto}.stage{width:100%;max-width:430px}.side{min-height:60vh}}</style></head><body><div class="app"><div class="stageWrap"><div id="stage" class="stage"><img id="bg" class="bg" alt=""><div id="items"></div></div></div><aside class="side"><h2>洞府后台编辑器</h2><div class="muted">上传原洞府背景和建筑 PNG 后，直接拖动、缩放、旋转、调前后层级。点“导出正式数据”复制给小T或接进游戏。</div><div class="group"><label>1. 上传洞府背景</label><input id="bgFile" type="file" accept="image/*"><div class="row"><button id="gridBtn">网格 开</button><button id="snapBtn">吸附 关</button></div></div><div class="group"><label>2. 添加建筑 PNG</label><input id="spriteFile" type="file" accept="image/*"><input id="spriteName" placeholder="建筑名，如 主殿 / 灵田"><button id="addSprite">添加建筑</button><button id="addHot">添加透明点击区</button></div><div class="group"><label>当前选中</label><div id="selectedInfo" class="stat">未选择</div><div class="row"><input id="nameInput" placeholder="名称"><input id="typeInput" placeholder="type，如 main_hall"></div><div class="row4"><button class="small" id="front">前移</button><button class="small" id="back">后移</button><button class="small" id="top">置顶</button><button class="small" id="bottom">置底</button></div><div class="row"><button id="lockBtn">锁定/解锁</button><button id="dupBtn">复制</button></div><button class="danger" id="delBtn">删除选中</button></div><div class="group"><label>精调</label><div class="row"><button id="left">←</button><button id="right">→</button><button id="up">↑</button><button id="down">↓</button></div><div class="row"><button id="smaller">缩小</button><button id="bigger">放大</button></div><div class="row"><button id="rotL">左旋</button><button id="rotR">右旋</button></div></div><div class="group"><button id="saveLocal">保存到浏览器</button><button id="loadLocal">读取浏览器保存</button><button id="resetAll" class="danger">清空全部</button></div><div class="group"><button id="exportBtn">导出正式数据</button><button id="copyBtn">复制导出内容</button><textarea id="out" placeholder="导出结果会出现在这里"></textarea></div></aside></div><script>const stage=document.getElementById('stage'),items=document.getElementById('items'),bg=document.getElementById('bg');let list=[],sel=null,drag=null,snap=false,grid=true,seq=1;function pct(n,a){return n/a*100}function clamp(n,a,b){return Math.max(a,Math.min(b,n))}function readFile(f,cb){const r=new FileReader();r.onload=()=>cb(r.result);r.readAsDataURL(f)}function z(o){return Math.round(o.y*10)+o.depth}function render(){items.innerHTML='';stage.classList.toggle('grid',grid);list.sort((a,b)=>z(a)-z(b));list.forEach(o=>{const el=document.createElement('div');el.className='item '+(o.kind==='hot'?'hot ':'')+(sel&&sel.id===o.id?'sel':'');el.dataset.id=o.id;el.style.left=o.x+'%';el.style.top=o.y+'%';el.style.width=o.w+'%';el.style.height=o.kind==='hot'?o.h+'%':'auto';el.style.zIndex=z(o);el.style.transform=`translate(-50%,-50%) scale(${o.scale}) rotate(${o.rot}deg)`;el.style.opacity=o.locked?.7:1;if(o.kind==='sprite')el.innerHTML=`<img src="${o.src}"><div class="handle"></div><div class="rot"></div>`;else el.innerHTML='<div class="handle"></div><div class="rot"></div>';el.onpointerdown=e=>startMove(e,o);el.querySelector('.handle')?.addEventListener('pointerdown',e=>startResize(e,o));el.querySelector('.rot')?.addEventListener('pointerdown',e=>startRotate(e,o));items.appendChild(el)});info()}function pick(o){sel=o;render()}function info(){selectedInfo.textContent=sel?`${sel.name||sel.type||sel.id}\nx:${sel.x.toFixed(1)} y:${sel.y.toFixed(1)} w:${sel.w.toFixed(1)} scale:${sel.scale.toFixed(2)} depth:${sel.depth} rot:${sel.rot}`:'未选择';nameInput.value=sel?.name||'';typeInput.value=sel?.type||''}function startMove(e,o){if(o.locked)return;pick(o);const r=stage.getBoundingClientRect();drag={mode:'move',id:o.id,dx:e.clientX,dy:e.clientY,ox:o.x,oy:o.y,rect:r};e.currentTarget.setPointerCapture(e.pointerId)}function startResize(e,o){e.stopPropagation();if(o.locked)return;pick(o);drag={mode:'resize',id:o.id,x:e.clientX,w:o.w,s:o.scale};e.currentTarget.setPointerCapture(e.pointerId)}function startRotate(e,o){e.stopPropagation();if(o.locked)return;pick(o);drag={mode:'rotate',id:o.id,x:e.clientX,rot:o.rot};e.currentTarget.setPointerCapture(e.pointerId)}window.onpointermove=e=>{if(!drag)return;const o=list.find(i=>i.id===drag.id);if(!o)return;if(drag.mode==='move'){let x=drag.ox+pct(e.clientX-drag.dx,drag.rect.width),y=drag.oy+pct(e.clientY-drag.dy,drag.rect.height);if(snap){x=Math.round(x/2.5)*2.5;y=Math.round(y/2.5)*2.5}o.x=clamp(x,0,100);o.y=clamp(y,0,100)}if(drag.mode==='resize'){o.w=clamp(drag.w+(e.clientX-drag.x)/8,3,90)}if(drag.mode==='rotate'){o.rot=Math.round(drag.rot+(e.clientX-drag.x)/2)}render()};window.onpointerup=()=>drag=null;stage.onwheel=e=>{if(!sel)return;e.preventDefault();sel.scale=clamp(sel.scale+(e.deltaY<0?.04:-.04),.15,4);render()};bgFile.onchange=e=>{const f=e.target.files[0];if(f)readFile(f,u=>{bg.src=u;localStorage.caveEditorBg=u})};addSprite.onclick=()=>{const f=spriteFile.files[0];if(!f)return alert('先选择建筑PNG');readFile(f,u=>{list.push({id:'b'+seq++,kind:'sprite',name:spriteName.value||f.name,type:'building',src:u,x:50,y:50,w:25,h:10,scale:1,depth:0,rot:0,locked:false});render()})};addHot.onclick=()=>{list.push({id:'h'+seq++,kind:'hot',name:spriteName.value||'点击区',type:'hotspot',x:50,y:50,w:22,h:12,scale:1,depth:0,rot:0,locked:false});render()};function mod(fn){if(!sel)return;fn(sel);render()}front.onclick=()=>mod(o=>o.depth+=10);back.onclick=()=>mod(o=>o.depth-=10);top.onclick=()=>mod(o=>o.depth+=100);bottom.onclick=()=>mod(o=>o.depth-=100);lockBtn.onclick=()=>mod(o=>o.locked=!o.locked);dupBtn.onclick=()=>{if(!sel)return;const n=JSON.parse(JSON.stringify(sel));n.id='b'+seq++;n.x+=3;n.y+=3;n.locked=false;list.push(n);sel=n;render()};delBtn.onclick=()=>{if(!sel)return;list=list.filter(o=>o.id!==sel.id);sel=null;render()};left.onclick=()=>mod(o=>o.x-=1);right.onclick=()=>mod(o=>o.x+=1);up.onclick=()=>mod(o=>o.y-=1);down.onclick=()=>mod(o=>o.y+=1);smaller.onclick=()=>mod(o=>o.scale=clamp(o.scale-.05,.15,4));bigger.onclick=()=>mod(o=>o.scale=clamp(o.scale+.05,.15,4));rotL.onclick=()=>mod(o=>o.rot-=5);rotR.onclick=()=>mod(o=>o.rot+=5);nameInput.oninput=()=>{if(sel){sel.name=nameInput.value;render()}};typeInput.oninput=()=>{if(sel){sel.type=typeInput.value;render()}};gridBtn.onclick=()=>{grid=!grid;gridBtn.textContent='网格 '+(grid?'开':'关');render()};snapBtn.onclick=()=>{snap=!snap;snapBtn.textContent='吸附 '+(snap?'开':'关')};saveLocal.onclick=()=>{localStorage.caveEditorLayout=JSON.stringify(list);alert('已保存')};loadLocal.onclick=()=>{try{list=JSON.parse(localStorage.caveEditorLayout||'[]');bg.src=localStorage.caveEditorBg||'';render()}catch(e){alert('读取失败')}};resetAll.onclick=()=>{if(confirm('确定清空？')){list=[];sel=null;render()}};exportBtn.onclick=()=>{const data=list.map(o=>({id:o.id,type:o.type||o.name,kind:o.kind,name:o.name,x:+o.x.toFixed(2),y:+o.y.toFixed(2),w:+o.w.toFixed(2),h:+(o.h||0).toFixed(2),scale:+o.scale.toFixed(2),depth:o.depth,rotation:o.rot,locked:!!o.locked}));out.value='const caveLayout = '+JSON.stringify(data,null,2)+';'};copyBtn.onclick=()=>{out.select();document.execCommand('copy')};window.onkeydown=e=>{if(!sel||['INPUT','TEXTAREA'].includes(document.activeElement.tagName))return;const step=e.shiftKey?5:1;if(e.key==='ArrowLeft'){sel.x-=step;render()}if(e.key==='ArrowRight'){sel.x+=step;render()}if(e.key==='ArrowUp'){sel.y-=step;render()}if(e.key==='ArrowDown'){sel.y+=step;render()}if(e.key==='Delete'){list=list.filter(o=>o.id!==sel.id);sel=null;render()}};if(localStorage.caveEditorBg)bg.src=localStorage.caveEditorBg;if(localStorage.caveEditorLayout)try{list=JSON.parse(localStorage.caveEditorLayout)}catch(e){}render();</script></body></html>
