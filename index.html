<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>修仙世界 · 洞府</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#050914;color:#ffe8a8;font-family:system-ui,-apple-system,"Microsoft YaHei",Arial,sans-serif;display:flex;justify-content:center}.phone{width:100%;max-width:430px;min-height:100vh;background:linear-gradient(#081525,#03060c);padding:12px 10px 86px}.top{border:1px solid rgba(230,195,106,.35);border-radius:18px;padding:12px;background:rgba(8,18,31,.85)}h1{margin:0;font-size:20px}.sub{font-size:12px;color:#9fb1bf}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.stat{border:1px solid rgba(230,195,106,.25);border-radius:12px;padding:8px;background:rgba(255,255,255,.04)}.stat span{display:block;color:#9fb1bf;font-size:11px}.stat b{font-size:14px}.cave{position:relative;margin-top:12px;border:1px solid #d8b86a;border-radius:20px;overflow:hidden;background:#06101c}.cave svg{display:block;width:100%;height:auto}.hot{position:absolute;border:1px solid transparent;border-radius:12px;background:transparent;cursor:pointer}.hot:hover,.hot.on{border-color:#57f4ff;background:rgba(87,244,255,.13);box-shadow:0 0 18px rgba(87,244,255,.45)}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.btn{border:1px solid rgba(230,195,106,.55);border-radius:12px;background:linear-gradient(#24384d,#0b1726);color:#ffe8a8;font-weight:700;padding:10px}.panel{margin-top:10px;border:1px solid rgba(230,195,106,.35);border-radius:16px;background:rgba(8,18,31,.85);padding:12px}.panel h2{margin:0 0 6px;font-size:18px}.green{color:#8cffb4}.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px;background:#050914;border-top:1px solid rgba(230,195,106,.3)}.nav button{border:0;border-radius:12px;background:transparent;color:#b8c5ce;padding:9px 4px}.nav .on{background:rgba(230,195,106,.15);color:#ffe8a8}
</style>
</head>
<body>
<main class="phone">
<section class="top"><h1>修仙世界</h1><div class="sub">洞府 · 可点击升级版</div><div class="stats"><div class="stat"><span>灵气</span><b id="qi">0</b></div><div class="stat"><span>灵石</span><b id="stone">1000</b></div><div class="stat"><span>境界</span><b>炼气期</b></div></div></section>
<div class="cave" id="cave">
<svg viewBox="0 0 1086 1448" xmlns="http://www.w3.org/2000/svg">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#17304a"/><stop offset="1" stop-color="#06101c"/></linearGradient><radialGradient id="aura" cx="50%" cy="40%" r="58%"><stop stop-color="#58f6ff" stop-opacity=".36"/><stop offset="1" stop-opacity="0"/></radialGradient><linearGradient id="roof" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#17677a"/><stop offset="1" stop-color="#071d2a"/></linearGradient></defs>
<rect width="1086" height="1448" fill="url(#bg)"/><circle cx="543" cy="530" r="570" fill="url(#aura)"/><path d="M215 300 L835 300 L1015 505 L543 800 L70 505Z" fill="#66767a" stroke="#d8b86a" stroke-width="5"/><path d="M250 360 L790 360 L930 512 L545 730 L155 512Z" fill="#42545c" opacity=".75"/><g stroke="#a9bdc0" stroke-width="2" opacity=".35"><path d="M250 360 L545 730 L790 360"/><path d="M155 512 L930 512"/><path d="M330 390 L650 660"/><path d="M230 580 L810 430"/></g><g filter="drop-shadow(0 12px 10px rgba(0,0,0,.55))">
<g transform="translate(545 350)"><path d="M-145 42 L0 -42 L145 42 L0 125Z" fill="#263947" stroke="#d8b86a" stroke-width="4"/><path d="M-112 6 L0 -72 L112 6 L0 64Z" fill="url(#roof)" stroke="#d8b86a" stroke-width="5"/><rect x="-78" y="20" width="156" height="86" rx="8" fill="#111b25" stroke="#caa85d" stroke-width="4"/><circle cx="0" cy="58" r="18" fill="#ffb84d"/><text y="155" text-anchor="middle" font-size="34" font-weight="800" fill="#ffe6a0">主殿</text></g>
<g transform="translate(315 535)"><path d="M-130 35 L0 -35 L130 35 L0 105Z" fill="#24412d" stroke="#d8b86a" stroke-width="4"/><path d="M-80 20 L-20 -12M-30 45 L35 5M25 65 L90 28M-95 55 L-42 28" stroke="#55f6aa" stroke-width="7"/><text y="135" text-anchor="middle" font-size="32" font-weight="800" fill="#ffe6a0">灵田</text></g>
<g transform="translate(740 535)"><path d="M-120 40 L0 -38 L120 40 L0 118Z" fill="#2a2b32" stroke="#d8b86a" stroke-width="4"/><circle cx="0" cy="28" r="52" fill="#14171c" stroke="#caa85d" stroke-width="5"/><circle cx="0" cy="28" r="25" fill="#ff9d2e"/><text y="150" text-anchor="middle" font-size="32" font-weight="800" fill="#ffe6a0">丹炉</text></g>
<g transform="translate(275 800)"><ellipse cx="0" cy="35" rx="132" ry="72" fill="#153847" stroke="#d8b86a" stroke-width="5"/><ellipse cx="0" cy="30" rx="90" ry="42" fill="#30dfff" opacity=".62"/><text y="138" text-anchor="middle" font-size="32" font-weight="800" fill="#ffe6a0">灵池</text></g>
<g transform="translate(545 705)"><path d="M-110 32 L0 -26 L110 32 L0 90Z" fill="#3f3428" stroke="#d8b86a" stroke-width="4"/><text y="120" text-anchor="middle" font-size="31" font-weight="800" fill="#ffe6a0">玉桌</text></g>
<g transform="translate(790 790)"><path d="M-72 42 L0 -30 L72 42 L0 105Z" fill="#1d3140" stroke="#d8b86a" stroke-width="4"/><rect x="-28" y="-12" width="56" height="82" rx="10" fill="#0b1822" stroke="#caa85d" stroke-width="4"/><circle cx="0" cy="28" r="26" fill="#51f6ff"/><text y="138" text-anchor="middle" font-size="31" font-weight="800" fill="#ffe6a0">灵灯</text></g>
<g transform="translate(545 965)"><ellipse cx="0" cy="55" rx="95" ry="42" fill="#33434c" stroke="#d8b86a" stroke-width="4"/><path d="M-20 45 C10 15 45 -10 28 -68 C76 -34 70 36 28 55 C3 68 -8 64 -20 45Z" fill="#b8d2ce" stroke="#eef4df" stroke-width="3"/><text y="145" text-anchor="middle" font-size="30" font-weight="800" fill="#ffe6a0">仙鹤雕像</text></g>
</g></svg>
<div id="hotLayer"></div>
</div>
<div class="actions"><button class="btn" id="cultivate">修炼一次</button><button class="btn" id="collect">收取收益</button><button class="btn" id="debug">显示热区</button></div>
<div class="panel"><h2 id="name">点击建筑</h2><div id="info">选择主殿、灵田、丹炉、灵池、玉桌、灵灯或仙鹤雕像。</div><button class="btn" id="upgrade" style="margin-top:10px;width:100%">升级建筑</button></div>
</main><nav class="nav"><button>角色</button><button>背包</button><button class="on">洞府</button><button>游历</button><button>商城</button></nav>
<script>
const S='cultivation-world-save';const hs=[['main_hall','主殿',38,15,26,18],['spirit_field','灵田',18,32,30,17],['pill_furnace','丹炉',61,31,25,18],['spirit_pool','灵池',13,51,27,16],['jade_table','玉桌',42,45,22,14],['spirit_lamp','灵灯',68,51,18,15],['crane_statue','仙鹤雕像',43,62,20,13]];let sel=null;function load(){let s;try{s=JSON.parse(localStorage.getItem(S)||'null')}catch(e){}if(!s)s={qi:0,stone:1000,levels:{}};hs.forEach(h=>{if(!s.levels[h[0]])s.levels[h[0]]=1});return s}function save(s){localStorage.setItem(S,JSON.stringify(s))}function render(){let s=load();qi.textContent=s.qi;stone.textContent=s.stone;hotLayer.innerHTML='';hs.forEach(h=>{let b=document.createElement('button');b.className='hot';b.style.left=h[2]+'%';b.style.top=h[3]+'%';b.style.width=h[4]+'%';b.style.height=h[5]+'%';b.onclick=()=>open(h);hotLayer.appendChild(b)})}function bonus(id,l){return id==='main_hall'?'洞府等级上限 +'+l:id==='spirit_field'?'灵草产量 +'+l*10+'%':id==='pill_furnace'?'突破成功率 +'+l*2+'%':id==='spirit_pool'?'修炼速度 +'+l*5+'%':id==='jade_table'?'游历奖励 +'+l*3+'%':id==='spirit_lamp'?'离线收益 +'+l*4+'%':'气运 +'+l}function open(h){sel=h;let s=load(),l=s.levels[h[0]];name.textContent=h[1]+' Lv.'+l;info.innerHTML='<span class="green">'+bonus(h[0],l)+'</span><br>升级消耗：'+(100+l*120)+' 灵石'}upgrade.onclick=()=>{if(!sel)return;let s=load(),l=s.levels[sel[0]],c=100+l*120;if(s.stone<c){alert('灵石不足');return}s.stone-=c;s.levels[sel[0]]=l+1;save(s);render();open(sel)};cultivate.onclick=()=>{let s=load();s.qi+=10+(s.levels.spirit_pool||1)*3;save(s);render()};collect.onclick=()=>{let s=load();let g=60+(s.levels.spirit_field||1)*15;s.stone+=g;save(s);render();alert('已收取收益 +'+g)};debug.onclick=()=>cave.classList.toggle('debug');save(load());render();
</script>
</body></html>
