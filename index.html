<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cultivation World · Cave Residence</title>
  <style>
    :root {
      --bg:#050a12;
      --panel:rgba(8,16,27,.88);
      --panel2:rgba(13,24,39,.96);
      --gold:#d8b86a;
      --gold2:#f4df9a;
      --cyan:#4ff4ff;
      --muted:#9eb3c1;
      --danger:#ff7469;
      --green:#85efac;
    }
    * { box-sizing:border-box; }
    html, body { margin:0; min-height:100%; background:radial-gradient(circle at top,#132238 0,#05070c 56%,#030407 100%); color:#f7e6b0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
    body { display:flex; justify-content:center; }
    button { font:inherit; }
    .phone { width:100%; max-width:430px; min-height:100dvh; position:relative; overflow:hidden; background:linear-gradient(180deg,#07111f,#050913); box-shadow:0 0 40px rgba(0,0,0,.65); }
    .topbar { position:sticky; top:0; z-index:30; padding:10px 12px 8px; background:linear-gradient(180deg,rgba(4,9,15,.97),rgba(4,9,15,.72)); border-bottom:1px solid rgba(216,184,106,.24); backdrop-filter:blur(10px); }
    .title-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
    .game-title { font-weight:800; letter-spacing:.04em; font-size:17px; color:var(--gold2); text-shadow:0 0 12px rgba(216,184,106,.35); }
    .small-btn { border:1px solid rgba(216,184,106,.55); color:var(--gold2); background:rgba(12,24,38,.82); border-radius:999px; padding:6px 10px; cursor:pointer; }
    .stats { margin-top:8px; display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
    .stat { min-width:0; padding:7px 8px; border:1px solid rgba(216,184,106,.25); border-radius:10px; background:rgba(7,15,25,.72); }
    .stat label { display:block; color:var(--muted); font-size:11px; line-height:1.1; }
    .stat strong { display:block; margin-top:3px; color:#fff1bb; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hero { padding:10px 10px 88px; }
    .section-head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin:8px 0 8px; }
    .section-head h2 { margin:0; font-size:18px; color:#ffe6a0; }
    .section-head p { margin:3px 0 0; color:var(--muted); font-size:12px; }
    .cave-wrap { position:relative; width:100%; border:1px solid rgba(216,184,106,.6); border-radius:18px; overflow:hidden; background:#071018; box-shadow:0 18px 50px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.05); }
    .cave-img { display:block; width:100%; height:auto; user-select:none; pointer-events:none; }
    .hotspot-layer { position:absolute; inset:0; z-index:5; }
    .hotspot { position:absolute; border:1px solid rgba(79,244,255,0); border-radius:12px; background:rgba(79,244,255,0); cursor:pointer; transition:.14s ease; }
    .debug .hotspot { border-color:rgba(79,244,255,.75); background:rgba(79,244,255,.11); }
    .hotspot:hover, .hotspot.active { border-color:rgba(79,244,255,.92); background:rgba(79,244,255,.11); box-shadow:0 0 18px rgba(79,244,255,.5), inset 0 0 16px rgba(79,244,255,.12); }
    .hotspot-name { position:absolute; left:50%; bottom:-22px; translate:-50% 0; padding:2px 6px; border:1px solid rgba(216,184,106,.45); border-radius:999px; background:rgba(5,10,17,.82); color:#f9e7a6; font-size:11px; white-space:nowrap; pointer-events:none; opacity:0; }
    .debug .hotspot-name, .hotspot.active .hotspot-name { opacity:1; }
    .quick-actions { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
    .action-btn { border:1px solid rgba(216,184,106,.55); border-radius:12px; padding:10px 8px; color:#ffe8a8; background:linear-gradient(180deg,rgba(26,45,62,.92),rgba(10,19,31,.92)); cursor:pointer; box-shadow:inset 0 0 18px rgba(216,184,106,.06); }
    .action-btn:active { transform:translateY(1px); }
    .bonus-card { margin-top:10px; padding:12px; border:1px solid rgba(216,184,106,.28); border-radius:14px; background:rgba(7,15,26,.72); }
    .bonus-card h3 { margin:0 0 8px; color:#ffe6a0; font-size:15px; }
    .bonus-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; color:#d8e5e5; font-size:12px; }
    .panel-mask { position:fixed; inset:0; z-index:90; display:none; align-items:flex-end; justify-content:center; background:rgba(0,0,0,.48); }
    .panel-mask.show { display:flex; }
    .panel { width:100%; max-width:430px; border:1px solid rgba(216,184,106,.7); border-radius:20px 20px 0 0; background:linear-gradient(180deg,rgba(14,25,40,.98),rgba(5,10,17,.98)); padding:16px 16px calc(18px + env(safe-area-inset-bottom)); box-shadow:0 -16px 48px rgba(0,0,0,.58); }
    .panel-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .panel h3 { margin:0; color:#ffe7a5; font-size:20px; }
    .panel .type { display:inline-block; margin-top:6px; font-size:12px; color:#91f5ff; border:1px solid rgba(79,244,255,.32); border-radius:999px; padding:3px 8px; background:rgba(79,244,255,.08); }
    .close { width:34px; height:34px; border:1px solid rgba(216,184,106,.45); border-radius:999px; background:rgba(255,255,255,.04); color:#ffe7a5; cursor:pointer; }
    .panel-info { margin:12px 0; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .info-box { padding:10px; border:1px solid rgba(216,184,106,.25); border-radius:12px; background:rgba(255,255,255,.035); }
    .info-box label { display:block; font-size:11px; color:var(--muted); }
    .info-box strong { display:block; margin-top:4px; font-size:14px; color:#fff1bb; }
    .upgrade { width:100%; margin-top:6px; padding:12px; border:1px solid rgba(216,184,106,.8); border-radius:14px; background:linear-gradient(180deg,#b98a31,#6d4617); color:#fff6ce; font-weight:800; cursor:pointer; }
    .upgrade:disabled { opacity:.45; cursor:not-allowed; }
    .msg { min-height:20px; margin-top:10px; color:#bcecff; font-size:13px; }
    .bottom-nav { position:fixed; left:50%; bottom:0; translate:-50% 0; width:100%; max-width:430px; z-index:40; display:grid; grid-template-columns:repeat(5,1fr); gap:4px; padding:8px 8px calc(8px + env(safe-area-inset-bottom)); border-top:1px solid rgba(216,184,106,.28); background:linear-gradient(180deg,rgba(7,12,18,.6),rgba(3,7,12,.97)); backdrop-filter:blur(12px); }
    .nav-btn { border:0; border-radius:12px; padding:8px 4px; color:#b9c7d0; background:transparent; cursor:pointer; font-size:12px; }
    .nav-btn.active { color:#ffe7a5; background:rgba(216,184,106,.12); box-shadow:inset 0 0 0 1px rgba(216,184,106,.24); }
    @media (min-width: 760px) { body { padding:20px 0; } .phone { min-height:calc(100dvh - 40px); border-radius:28px; border:1px solid rgba(216,184,106,.35); } .bottom-nav { bottom:20px; border-radius:0 0 28px 28px; } }
  </style>
</head>

      <div class="title-row">
        <div>
          <div class="game-title" data-i18n="game.title">修仙世界</div>

      </div>
      <div class="stats">

      { id:"spirit_field", type:"production", x:18, y:32, w:30, h:17 },
      { id:"pill_furnace", type:"workshop", x:61, y:31, w:25, h:18 },
      { id:"spirit_pool", type:"production", x:13, y:51, w:27, h:16 },
      { id:"jade_table", type:"decor", x:42, y:45, w:22, h:14 },
      { id:"spirit_lamp", type:"decor", x:68, y:51, w:18, h:15 },
      { id:"crane_statue", type:"decor", x:43, y:62, w:20, h:13 }
    ];

    const bonusRules = {
      main_hall: level => ({ zh:`洞府等级上限 +${level}`, en:`Cave level cap +${level}` }),
      spirit_field: level => ({ zh:`灵草产量 +${level * 10}%`, en:`Herb production +${level * 10}%` }),
      pill_furnace: level => ({ zh:`突破成功率 +${level * 2}%`, en:`Breakthrough chance +${level * 2}%` }),
      spirit_pool: level => ({ zh:`修炼速度 +${level * 5}%`, en:`Qi gain +${level * 5}%` }),
      jade_table: level => ({ zh:`游历奖励 +${level * 3}%`, en:`Adventure rewards +${level * 3}%` }),
      spirit_lamp: level => ({ zh:`离线收益 +${level * 4}%`, en:`Offline gains +${level * 4}%` }),
      crane_statue: level => ({ zh:`气运 +${level}`, en:`Luck +${level}` })
    };

    let selectedBuilding = null;

    function getLang() { return localStorage.getItem("cw_lang") || DEFAULT_LANG; }
    function setLang(lang) { localStorage.setItem("cw_lang", lang); renderAll(); }
    function t(key) { return TEXT[getLang()]?.[key] || TEXT.zh[key] || key; }

    function loadSave() {
      const raw = localStorage.getItem(SAVE_KEY);
      let save;
      try { save = raw ? JSON.parse(raw) : null; } catch { save = null; }
      if (!save) save = { qi: 0, spiritStone: 1000, realm: "qi_refining", cave: { buildingLevels: {} } };
      if (!save.cave) save.cave = { buildingLevels: {} };
      if (!save.cave.buildingLevels) save.cave.buildingLevels = {};
      caveHotspots.forEach(b => { if (!save.cave.buildingLevels[b.id]) save.cave.buildingLevels[b.id] = 1; });
      return save;
    }
    function saveGame(save) { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }

    function costFor(level) { return 100 + level * 120; }
    function bonusFor(id, level) { return bonusRules[id]?.(level)?.[getLang()] || `+${level}`; }

    function renderI18n() {
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (key === "button.hotspots" && document.getElementById("caveWrap").classList.contains("debug")) el.textContent = t("button.hideHotspots");
        else el.textContent = t(key);
      });
    }

    function renderStats() {
      const save = loadSave();
      document.getElementById("qiValue").textContent = Math.floor(save.qi).toLocaleString();
      document.getElementById("stoneValue").textContent = Math.floor(save.spiritStone).toLocaleString();
      document.getElementById("realmValue").textContent = t(`realm.${save.realm}`);
    }

    function renderHotspots() {
      const layer = document.getElementById("hotspotLayer");
      layer.innerHTML = "";
      caveHotspots.forEach(building => {
        const btn = document.createElement("button");
        btn.className = "hotspot";
        btn.dataset.id = building.id;
        btn.style.left = building.x + "%";
        btn.style.top = building.y + "%";
        btn.style.width = building.w + "%";
        btn.style.height = building.h + "%";
        btn.setAttribute("aria-label", t(`building.${building.id}`));
        btn.innerHTML = `<span class="hotspot-name">${t(`building.${building.id}`)}</span>`;
        btn.addEventListener("click", () => openPanel(building));
        layer.appendChild(btn);
      });
    }

    function renderBonuses() {
      const save = loadSave();
      const grid = document.getElementById("bonusGrid");
      grid.innerHTML = caveHotspots.map(b => {
        const level = save.cave.buildingLevels[b.id] || 1;
        return `<div>• ${t(`building.${b.id}`)} Lv.${level}<br><span style="color:#91f5ff">${bonusFor(b.id, level)}</span></div>`;
      }).join("");
    }

    function openPanel(building) {
      selectedBuilding = building;
      const save = loadSave();
      const level = save.cave.buildingLevels[building.id] || 1;
      document.querySelectorAll(".hotspot").forEach(el => el.classList.toggle("active", el.dataset.id === building.id));
      document.getElementById("panelTitle").textContent = t(`building.${building.id}`);
      document.getElementById("panelType").textContent = t(`type.${building.type}`);
      document.getElementById("panelLevel").textContent = `Lv.${level}`;
      document.getElementById("panelCost").textContent = `${costFor(level).toLocaleString()} ${t("stat.stone")}`;
      document.getElementById("panelBonus").textContent = bonusFor(building.id, level);
      document.getElementById("panelMsg").textContent = "";
      document.getElementById("panelMask").classList.add("show");
    }

    function closePanel() {
      selectedBuilding = null;
      document.getElementById("panelMask").classList.remove("show");
      document.querySelectorAll(".hotspot").forEach(el => el.classList.remove("active"));
    }

    function renderAll() { renderI18n(); renderStats(); renderHotspots(); renderBonuses(); if (selectedBuilding) openPanel(selectedBuilding); }

    document.getElementById("langBtn").addEventListener("click", () => setLang(getLang() === "zh" ? "en" : "zh"));
    document.getElementById("debugBtn").addEventListener("click", () => { document.getElementById("caveWrap").classList.toggle("debug"); renderI18n(); });
    document.getElementById("closePanel").addEventListener("click", closePanel);
    document.getElementById("panelMask").addEventListener("click", e => { if (e.target.id === "panelMask") closePanel(); });
    document.getElementById("upgradeBtn").addEventListener("click", () => {
      if (!selectedBuilding) return;
      const save = loadSave();
      const id = selectedBuilding.id;
      const level = save.cave.buildingLevels[id] || 1;
      const cost = costFor(level);
      const msg = document.getElementById("panelMsg");
      if (save.spiritStone < cost) { msg.textContent = t("msg.noStone"); msg.style.color = "var(--danger)"; return; }
      save.spiritStone -= cost;
      save.cave.buildingLevels[id] = level + 1;
      saveGame(save);
      msg.textContent = t("msg.upgraded"); msg.style.color = "var(--green)";
      renderStats(); renderBonuses(); openPanel(selectedBuilding);
    });
    document.getElementById("cultivateBtn").addEventListener("click", () => { const save = loadSave(); save.qi += 10 + (save.cave.buildingLevels.spirit_pool || 1) * 3; saveGame(save); renderStats(); });
    document.getElementById("collectBtn").addEventListener("click", () => { const save = loadSave(); const gain = 60 + (save.cave.buildingLevels.spirit_field || 1) * 15; save.spiritStone += gain; saveGame(save); renderStats(); alert(t("msg.collect") + ` +${gain}`); });
    document.getElementById("resetBtn").addEventListener("click", () => { if (!confirm(t("msg.reset") + "?")) return; localStorage.removeItem(SAVE_KEY); renderAll(); });

    saveGame(loadSave());
    renderAll();
  </script>
</body>
</html>
